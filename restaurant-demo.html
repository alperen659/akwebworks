<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurant Demo</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#0a0a0a;color:#f5f2ec}
header{padding:20px;background:#131310;border-bottom:1px solid #333}
a{color:#e8572a;text-decoration:none}
.wrap{max-width:900px;margin:auto;padding:30px 20px}
.card{background:#181812;border:1px solid #333;border-radius:10px;padding:22px;margin-bottom:20px}
.item{display:flex;justify-content:space-between;gap:20px;border-bottom:1px solid #333;padding:16px 0}
button{background:#e8572a;color:#fff;border:none;padding:10px 14px;border-radius:6px;cursor:pointer;font-weight:bold}
input,select{width:100%;padding:14px;margin-top:10px;border-radius:6px;border:1px solid #444;background:#111;color:#fff}
.cart{position:sticky;bottom:0;background:#131310;border-top:1px solid #333;padding:20px}
</style>
</head>
<body>

<header>
  <a href="index.html">← Main Page</a> |
  <a href="restaurant-owner.html">Owner Dashboard</a>
</header>

<div class="wrap">
  <div class="card">
    <h1>Pizzeria Demo</h1>
    <p>Bestelle etwas. Danach erscheint die Bestellung im Owner Dashboard.</p>

    <input id="customer" type="text" placeholder="Dein Name">
    <select id="type">
      <option>Abholung</option>
      <option>Lieferung</option>
    </select>
  </div>

  <div class="card">
    <h2>Speisekarte</h2>

    <div class="item">
      <div><strong>Pizza Margherita</strong><br>8,90 €</div>
      <button onclick="addItem('Pizza Margherita', 8.90)">+</button>
    </div>

    <div class="item">
      <div><strong>Pizza Salami</strong><br>10,90 €</div>
      <button onclick="addItem('Pizza Salami', 10.90)">+</button>
    </div>

    <div class="item">
      <div><strong>Döner Teller</strong><br>12,50 €</div>
      <button onclick="addItem('Döner Teller', 12.50)">+</button>
    </div>

    <div class="item">
      <div><strong>Cola 0,33l</strong><br>2,50 €</div>
      <button onclick="addItem('Cola 0,33l', 2.50)">+</button>
    </div>
  </div>
</div>

<div class="cart">
  Warenkorb: <strong id="count">0</strong> Artikel —
  Summe: <strong id="total">0,00 €</strong>
  <button onclick="placeOrder()">Bestellung abschicken</button>
</div>

<script>
let cart = [];

function addItem(name, price){
  cart.push({name, price});
  updateCart();
}

function updateCart(){
  const total = cart.reduce((sum, item) => sum + item.price, 0);
  document.getElementById("count").textContent = cart.length;
  document.getElementById("total").textContent = total.toFixed(2).replace(".", ",") + " €";
}

function placeOrder(){
  if(cart.length === 0){
    alert("Bitte erst etwas in den Warenkorb legen.");
    return;
  }

  const order = {
    id: Math.floor(Math.random() * 9000) + 1000,
    customer: document.getElementById("customer").value || "Demo Kunde",
    type: document.getElementById("type").value,
    items: cart,
    total: cart.reduce((sum, item) => sum + item.price, 0),
    time: new Date().toLocaleString("de-DE"),
    status: "Neu"
  };

  const orders = JSON.parse(localStorage.getItem("restaurantOrders")) || [];
  orders.push(order);
  localStorage.setItem("restaurantOrders", JSON.stringify(orders));

  cart = [];
  updateCart();

  alert("Bestellung gespeichert. Öffne jetzt das Owner Dashboard.");
}
</script>

</body>
</html>
