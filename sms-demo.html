<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SMS Demo</title>

<style>
body{
  background:#0a0a0a;
  color:#fff;
  font-family:Arial;
  margin:0;
}

.wrap{
  max-width:700px;
  margin:auto;
  padding:30px 20px;
}

.phone{
  background:#181812;
  border:1px solid #333;
  border-radius:30px;
  padding:25px;
}

.sms{
  background:#e8572a;
  padding:14px;
  border-radius:14px;
  margin-bottom:15px;
  line-height:1.5;
}
</style>
</head>

<body>

<div class="wrap">

<h1>SMS Erinnerungs Demo</h1>

<div class="phone">

<div class="sms">
Hallo Max 👋<br><br>
Dein Termin bei Friseur Bella ist morgen um 14:30 Uhr.
</div>

<div class="sms">
Deine Bestellung #1042 ist jetzt fertig zur Abholung 🍕
</div>

</div>

</div>

</body>
</html>
