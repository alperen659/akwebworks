<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KI Chatbot Demo – Network Studio</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#f5f2ec;font-family:Arial,sans-serif}
header{padding:20px;background:#111;border-bottom:1px solid #2a2a2a}
a{color:#e8572a;text-decoration:none}
.wrap{max-width:900px;margin:auto;padding:40px 20px}
.card{background:#131310;border:1px solid #2a2a2a;border-radius:16px;padding:24px}
.chat{height:520px;display:flex;flex-direction:column;background:#181812;border:1px solid #333;border-radius:18px;overflow:hidden;margin-top:25px}
.chat-head{background:#e8572a;padding:18px;font-weight:bold}
.messages{flex:1;padding:18px;overflow:auto;display:flex;flex-direction:column;gap:12px}
.bot,.user{padding:13px;border-radius:12px;line-height:1.5;max-width:80%}
.bot{background:#262621;align-self:flex-start}
.user{background:#e8572a;align-self:flex-end}
.input{display:flex;border-top:1px solid #333}
input{flex:1;padding:16px;background:#0f0f0d;color:#fff;border:none;outline:none}
button{width:70px;background:#e8572a;color:white;border:none;font-weight:bold;cursor:pointer}
.quick{display:flex;gap:10px;flex-wrap:wrap;margin-top:15px}
.quick button{width:auto;padding:10px 14px;border-radius:999px}
</style>
</head>
<body>

<header>
<a href="modelle.html">← Zurück zu Modelle</a>
</header>

<div class="wrap">
<div class="card">
<h1>KI Chatbot Demo</h1>
<p>Teste einen einfachen Beispiel-Chatbot für Kundenfragen.</p>

<div class="quick">
<button onclick="quick('Was kostet eine Website?')">Preisfrage</button>
<button onclick="quick('Ich möchte einen Termin buchen')">Termin</button>
<button onclick="quick('Welche Demos gibt es?')">Demos</button>
<button onclick="quick('Wie schnell seid ihr fertig?')">Lieferzeit</button>
</div>

<div class="chat">
<div class="chat-head">Network Studio KI</div>
<div class="messages" id="messages">
<div class="bot">Hallo 👋 Ich bin die Demo-KI. Frag mich etwas zu Preisen, Terminen, Demos oder Lieferzeit.</div>
</div>
<div class="input">
<input id="input" placeholder="Nachricht schreiben..." onkeydown="if(event.key==='Enter')send()">
<button onclick="send()">➜</button>
</div>
</div>
</div>
</div>

<script>
function quick(text){
document.getElementById("input").value=text;
send();
}

function send(){
const input=document.getElementById("input");
const text=input.value.trim();
if(!text)return;

const messages=document.getElementById("messages");
messages.innerHTML+=`<div class="user">${text}</div>`;

const lower=text.toLowerCase();
let answer="Das kann ich in dieser Demo noch nicht genau beantworten. Für eine echte Anfrage nutze bitte die Anfrage-Seite.";

if(lower.includes("preis")||lower.includes("kost")){
answer='Die Pakete starten bei 299 € Einrichtung plus monatlicher Pauschale. <br><br><a href="preise.html" style="color:#ffb347">Preise öffnen →</a>';
}
else if(lower.includes("termin")){
answer='Für Friseure kann eine Online-Terminbuchung umgesetzt werden. <br><br><a href="friseur-demo.html" style="color:#ffb347">Termin-Demo öffnen →</a>';
}
else if(lower.includes("demo")){
answer='Es gibt Demos für Friseur, Restaurant, Dashboard, Inventar, SMS, Mitarbeiter und KI-Chatbot. <br><br><a href="modelle.html" style="color:#ffb347">Modelle öffnen →</a>';
}
else if(lower.includes("liefer")||lower.includes("schnell")||lower.includes("fertig")){
answer='Einfache Systeme können als Demo innerhalb von ca. 48 Stunden vorbereitet werden.';
}
else if(lower.includes("restaurant")||lower.includes("bestellung")){
answer='Für Restaurants gibt es ein Online-Bestellsystem ohne Plattform-Provision. <br><br><a href="restaurant-demo.html" style="color:#ffb347">Restaurant-Demo öffnen →</a>';
}

setTimeout(()=>{
messages.innerHTML+=`<div class="bot">${answer}</div>`;
messages.scrollTop=messages.scrollHeight;
},400);

input.value="";
}
</script>

</body>
</html>
