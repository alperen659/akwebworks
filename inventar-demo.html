<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Inventarverwaltung Demo</title>

<style>
body{
  background:#0a0a0a;
  color:#f5f2ec;
  font-family:Arial;
  margin:0;
}

header{
  padding:20px;
  background:#131310;
}

.wrap{
  max-width:1000px;
  margin:auto;
  padding:30px 20px;
}

.card{
  background:#181812;
  border:1px solid #333;
  border-radius:10px;
  padding:20px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:14px;
  border-bottom:1px solid #333;
  text-align:left;
}

.low{
  color:#ff5f57;
}

.good{
  color:#28c840;
}
</style>
</head>

<body>

<header>
<a href="index.html" style="color:#e8572a;">
← Main Page
</a>
</header>

<div class="wrap">

<div class="card">

<h1>Inventarverwaltung</h1>

<table>

<tr>
<th>Produkt</th>
<th>Bestand</th>
<th>Status</th>
</tr>

<tr>
<td>Shampoo Premium</td>
<td>18</td>
<td class="good">Verfügbar</td>
</tr>

<tr>
<td>Pizza Kartons</td>
<td>240</td>
<td class="good">Verfügbar</td>
</tr>

<tr>
<td>Haarfarbe Schwarz</td>
<td>2</td>
<td class="low">Niedrig</td>
</tr>

<tr>
<td>Cola Dosen</td>
<td>7</td>
<td class="low">Nachbestellen</td>
</tr>

</table>

</div>

</div>

</body>
</html>
