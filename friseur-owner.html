<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Friseur Owner Dashboard</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#0a0a0a;color:#f5f2ec}
header{padding:20px;background:#131310;border-bottom:1px solid #333}
a{color:#e8572a;text-decoration:none}
.wrap{max-width:1000px;margin:auto;padding:30px 20px}
.card{background:#181812;border:1px solid #333;border-radius:10px;padding:22px;margin-bottom:20px}
.empty{color:#b8b1a7}
table{width:100%;border-collapse:collapse}
th,td{padding:12px;border-bottom:1px solid #333;text-align:left}
button{background:#e8572a;color:#fff;border:none;padding:12px 18px;border-radius:6px;cursor:pointer;font-weight:bold}
</style>
</head>
<body>

<header>
  <a href="friseur-demo.html">← Besucher Demo</a> |
  <a href="index.html">Main Page</a>
</header>

<div class="wrap">
  <h1>Friseur Bella – Owner Dashboard</h1>

  <div class="card">
    <h2>Gebuchte Termine</h2>
    <div id="content"></div>
  </div>

  <button onclick="clearAppointments()">Demo zurücksetzen</button>
</div>

<script>
function loadAppointments(){
  const appointments = JSON.parse(localStorage.getItem("friseurAppointments")) || [];
  const content = document.getElementById("content");

  if(appointments.length === 0){
    content.innerHTML = '<p class="empty">Noch keine Termine vorhanden. Buche zuerst einen Termin über die Besucher-Demo.</p>';
    return;
  }

  let html = `
    <table>
      <tr>
        <th>Zeit</th>
        <th>Kunde</th>
        <th>Leistung</th>
        <th>Mitarbeiter</th>
      </tr>
  `;

  appointments.forEach(a => {
    html += `
      <tr>
        <td>${a.time}</td>
        <td>${a.name}<br><small>${a.email}</small></td>
        <td>${a.service}</td>
        <td>${a.employee}</td>
      </tr>
    `;
  });

  html += '</table>';
  content.innerHTML = html;
}

function clearAppointments(){
  localStorage.removeItem("friseurAppointments");
  loadAppointments();
}

loadAppointments();
</script>

</body>
</html>
