<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurant Owner Dashboard</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#0a0a0a;color:#f5f2ec}
header{padding:20px;background:#131310;border-bottom:1px solid #333}
a{color:#e8572a;text-decoration:none}
.wrap{max-width:1000px;margin:auto;padding:30px 20px}
.card{background:#181812;border:1px solid #333;border-radius:10px;padding:22px;margin-bottom:20px}
.empty{color:#b8b1a7}
.order{border-bottom:1px solid #333;padding:16px 0}
.badge{background:#e8572a;padding:4px 10px;border-radius:20px;font-size:.8rem}
button{background:#e8572a;color:#fff;border:none;padding:12px 18px;border-radius:6px;cursor:pointer;font-weight:bold}
</style>
</head>
<body>

<header>
  <a href="restaurant-demo.html">← Besucher Demo</a> |
  <a href="index.html">Main Page</a>
</header>

<div class="wrap">
  <h1>Restaurant – Owner Dashboard</h1>

  <div class="card">
    <h2>Live-Bestellungen</h2>
    <div id="content"></div>
  </div>

  <button onclick="clearOrders()">Demo zurücksetzen</button>
</div>

<script>
function loadOrders(){
  const orders = JSON.parse(localStorage.getItem("restaurantOrders")) || [];
  const content = document.getElementById("content");

  if(orders.length === 0){
    content.innerHTML = '<p class="empty">Noch keine Bestellungen vorhanden. Erstelle zuerst eine Bestellung über die Besucher-Demo.</p>';
    return;
  }

  let html = "";

  orders.forEach(order => {
    const items = order.items.map(i => i.name).join(", ");

    html += `
      <div class="order">
        <strong>#${order.id} – ${items}</strong><br>
        Kunde: ${order.customer}<br>
        Art: ${order.type}<br>
        Summe: ${order.total.toFixed(2).replace(".", ",")} €<br>
        Zeit: ${order.time}<br><br>
        <span class="badge">${order.status}</span>
      </div>
    `;
  });

  content.innerHTML = html;
}

function clearOrders(){
  localStorage.removeItem("restaurantOrders");
  loadOrders();
}

loadOrders();
</script>

</body>
</html>
